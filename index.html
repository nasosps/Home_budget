<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Οικονομικά Σπιτιού 2025</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; }
        .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: white; position: relative; }
        .counter-badge { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 2px 6px; font-size: 10px; border-radius: 4px; pointer-events: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

<div class="mobile-container flex flex-col">
    
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-bold"><i class="fas fa-wallet mr-2"></i> Budget 2025</h1>
            <button id="logoutBtn" class="hidden text-sm bg-blue-700 px-3 py-1 rounded">Έξοδος</button>
        </div>
    </div>

    <div id="mainContent" class="flex-grow p-4 relative">
        
        <div id="loginView" class="flex flex-col justify-center items-center h-[80vh]">
            <div class="bg-white p-6 rounded-lg shadow-sm w-full border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-center text-gray-700">Είσοδος / Εγγραφή</h2>
                
                <input type="email" id="emailInput" placeholder="Email" class="w-full p-3 mb-3 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                <input type="password" id="passInput" placeholder="Κωδικός" class="w-full p-3 mb-6 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                
                <div class="flex gap-2">
                    <button onclick="handleLogin()" class="flex-1 bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">
                        Σύνδεση
                    </button>
                    <button onclick="handleRegister()" class="flex-1 bg-green-600 text-white p-3 rounded font-bold hover:bg-green-700">
                        Εγγραφή
                    </button>
                </div>

                <p id="loginMsg" class="text-red-500 text-sm mt-4 text-center min-h-[20px]"></p>
                <p class="text-xs text-gray-400 mt-4 text-center">
                    Πάτα <b>"Εγγραφή"</b> αν μπαίνεις πρώτη φορά.
                </p>
            </div>
        </div>

        <div id="dashboardView" class="hidden space-y-4">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl p-5 text-white shadow-lg">
                <p class="text-sm opacity-80">Διαθέσιμο Υπόλοιπο</p>
                <h2 class="text-3xl font-bold mt-1">€ <span id="balanceDisplay">0,00</span></h2>
            </div>
             <div class="text-center text-gray-500 mt-10">
                <p>Καλωσήρθες! Η εφαρμογή είναι έτοιμη.</p>
                <p class="text-sm mt-2">Επόμενο βήμα: Να περάσουμε τις δόσεις.</p>
            </div>
        </div>

    </div>

    <div id="counter" class="counter-badge">Visits: <span id="visitCount">0</span></div>
</div>

<script>
    // --- ΤΑ ΚΛΕΙΔΙΑ ΣΟΥ (Είναι σωστά) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDV6btFSq5IeQlVq7YihlJOkaKam-MrsJQ",
      authDomain: "home-budget-gr.firebaseapp.com",
      projectId: "home-budget-gr",
      storageBucket: "home-budget-gr.firebasestorage.app",
      messagingSenderId: "530104677253",
      appId: "1:530104677253:web:3e166ea9ec706f60384aec",
      measurementId: "G-BLBX2JZR15"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // UI Elements
    const loginView = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginMsg = document.getElementById('loginMsg');

    // Auth Listener
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("Logged in:", user.email);
            showApp();
        } else {
            showLogin();
        }
    });

    function showLogin() {
        loginView.classList.remove('hidden');
        dashboardView.classList.add('hidden');
        logoutBtn.classList.add('hidden');
        loginMsg.innerText = "";
    }

    function showApp() {
        loginView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
    }

    // --- LOGIN ---
    function handleLogin() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        if (!email || !pass) { loginMsg.innerText = "Συμπλήρωσε τα πεδία."; return; }
        
        loginMsg.innerText = "Σύνδεση...";
        auth.signInWithEmailAndPassword(email, pass)
            .catch((error) => {
                loginMsg.innerText = "Σφάλμα: " + error.message;
            });
    }

    // --- REGISTER (ΝΕΟ!) ---
    function handleRegister() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        if (!email || !pass) { loginMsg.innerText = "Συμπλήρωσε τα πεδία."; return; }

        loginMsg.innerText = "Δημιουργία χρήστη...";
        auth.createUserWithEmailAndPassword(email, pass)
            .then(() => {
                loginMsg.innerText = "Επιτυχία! Συνδέεσαι...";
            })
            .catch((error) => {
                loginMsg.innerText = "Σφάλμα Εγγραφής: " + error.message;
            });
    }

    // Logout
    logoutBtn.addEventListener('click', () => auth.signOut());

    // Counter
    let count = localStorage.getItem('pageVisits') || 0;
    count++;
    localStorage.setItem('pageVisits', count);
    document.getElementById('visitCount').innerText = count;
</script>

</body>
</html>
