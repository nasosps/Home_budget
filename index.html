<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Οικονομικά Σπιτιού</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; }
        .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: white; position: relative; padding-bottom: 80px; }
        
        /* Floating Button (FAB) */
        .fab-btn { position: fixed; bottom: 40px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background-color: #2563eb; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); font-size: 24px; z-index: 50; cursor: pointer; transition: transform 0.2s; }
        .fab-btn:active { transform: scale(0.95); }

        .counter-badge { position: fixed; bottom: 5px; right: 5px; background: rgba(0,0,0,0.3); color: white; padding: 2px 4px; font-size: 9px; border-radius: 4px; pointer-events: none; z-index: 100; }
        
        /* Modal Animation */
        .modal { transition: opacity 0.3s ease; }
        .modal-content { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal.active .modal-content { transform: translateY(0); }
        
        /* Progress Bar Animation */
        .progress-bar-striped { background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent); background-size: 1rem 1rem; }
    </style>
</head>
<body>

<div class="mobile-container flex flex-col">
    
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-lg font-bold"><i class="fas fa-wallet mr-2"></i> Οικονομικά</h1>
        <button id="logoutBtn" class="hidden text-xs bg-blue-800 px-3 py-1 rounded opacity-90 hover:bg-blue-900">Έξοδος</button>
    </div>

    <div id="mainContent" class="flex-grow p-4">
        
        <div id="loginView" class="flex flex-col justify-center items-center h-[70vh]">
            <div class="w-full bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Καλωσήρθες</h2>
                <div class="space-y-4">
                    <input type="email" id="emailInput" placeholder="Email" class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition">
                    <input type="password" id="passInput" placeholder="Κωδικός" class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-blue-500 outline-none transition">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold mt-6 hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Σύνδεση</button>
                <p id="loginMsg" class="text-red-500 text-sm text-center mt-4"></p>
            </div>
        </div>

        <div id="dashboardView" class="hidden space-y-6">
            
            <div class="bg-gray-900 text-white rounded-2xl p-6 shadow-xl relative overflow-hidden">
                <div class="absolute -right-5 -top-5 w-24 h-24 bg-white opacity-5 rounded-full"></div>
                
                <p class="text-gray-400 text-xs uppercase tracking-wider font-semibold">Μηνιαιο συνολο Δοσεων</p>
                <div class="flex items-baseline mt-2">
                    <span class="text-4xl font-bold">€</span>
                    <span class="text-4xl font-bold ml-1" id="totalMonthlyAmount">0.00</span>
                </div>
                <p class="text-xs text-gray-400 mt-3 border-t border-gray-700 pt-3">
                    <i class="fas fa-info-circle mr-1"></i> Το ποσό που πληρώνεις αυτόν τον μήνα.
                </p>
            </div>

            <div>
                <div class="flex justify-between items-end mb-4">
                    <h3 class="font-bold text-gray-800 text-lg">Οι Δόσεις μου</h3>
                    <span id="activeCount" class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">0 ενεργές</span>
                </div>
                
                <div id="installmentsList" class="space-y-4 pb-20">
                    <div class="flex justify-center py-10">
                        <i class="fas fa-circle-notch fa-spin text-blue-500 text-2xl"></i>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="fabBtn" class="fab-btn hidden" onclick="openModal()">
        <i class="fas fa-plus"></i>
    </div>

    <div id="addModal" class="modal fixed inset-0 bg-black/60 z-50 hidden flex items-end justify-center backdrop-blur-sm" onclick="if(event.target === this) closeModal()">
        <div class="modal-content bg-white w-full max-w-md rounded-t-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-gray-800">Προσθήκη Δόσης</h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Τιτλος</label>
                    <input type="text" id="inpTitle" placeholder="π.χ. Τηλεόραση" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                </div>
                
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Συνολο (€)</label>
                        <input type="number" id="inpAmount" placeholder="€" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Δοσεις</label>
                        <input type="number" id="inpMonths" placeholder="12" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Ημερομηνια 1ης Δοσης</label>
                    <input type="date" id="inpDate" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                </div>

                <button onclick="saveInstallment()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition transform">Αποθήκευση</button>
            </div>
        </div>
    </div>

    <div id="counter" class="counter-badge">Visits: <span id="visitCount">0</span></div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDV6btFSq5IeQlVq7YihlJOkaKam-MrsJQ",
      authDomain: "home-budget-gr.firebaseapp.com",
      projectId: "home-budget-gr",
      storageBucket: "home-budget-gr.firebasestorage.app",
      messagingSenderId: "530104677253",
      appId: "1:530104677253:web:3e166ea9ec706f60384aec",
      measurementId: "G-BLBX2JZR15"
    };

    // Initialize
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;

    // --- AUTH LISTENER ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('fabBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            loadInstallments();
        } else {
            currentUser = null;
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('fabBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    });

    // --- LOGIN ---
    function handleLogin() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        const msg = document.getElementById('loginMsg');
        
        if(!email || !pass) { msg.innerText = "Συμπλήρωσε τα πεδία."; return; }
        
        msg.innerText = "Έλεγχος...";
        auth.signInWithEmailAndPassword(email, pass).catch(e => {
            msg.innerText = "Λάθος στοιχεία ή ο χρήστης δεν υπάρχει.";
            console.error(e);
        });
    }

    // --- MODAL FUNCTIONS ---
    function openModal() {
        const modal = document.getElementById('addModal');
        modal.classList.remove('hidden');
        setTimeout(() => modal.classList.add('active'), 10);
        // Default to today's date if empty
        if(!document.getElementById('inpDate').value) {
            document.getElementById('inpDate').valueAsDate = new Date();
        }
    }
    
    function closeModal() {
        const modal = document.getElementById('addModal');
        modal.classList.remove('active');
        setTimeout(() => modal.classList.add('hidden'), 300);
    }

    // --- SAVE INSTALLMENT ---
    function saveInstallment() {
        const title = document.getElementById('inpTitle').value;
        const total = parseFloat(document.getElementById('inpAmount').value);
        const months = parseInt(document.getElementById('inpMonths').value);
        const start = document.getElementById('inpDate').value;

        if(!title || !total || !months || !start) { alert("Συμπλήρωσε όλα τα πεδία!"); return; }

        const monthlyPayment = total / months;

        // Save to Firestore
        db.collection('users').doc(currentUser.uid).collection('installments').add({
            title: title,
            totalAmount: total,
            totalMonths: months,
            startDate: start,
            monthlyPayment: monthlyPayment,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            closeModal();
            // Clear inputs
            document.getElementById('inpTitle').value = '';
            document.getElementById('inpAmount').value = '';
            document.getElementById('inpMonths').value = '';
        }).catch(e => alert("Error saving: " + e.message));
    }

    // --- LOAD & CALCULATE ---
    function loadInstallments() {
        db.collection('users').doc(currentUser.uid).collection('installments')
          .orderBy('startDate', 'desc')
          .onSnapshot((snapshot) => {
              const list = document.getElementById('installmentsList');
              const totalDisplay = document.getElementById('totalMonthlyAmount');
              const activeCountDisplay = document.getElementById('activeCount');
              
              let totalMonthly = 0;
              let activeCount = 0;
              list.innerHTML = ""; 

              if(snapshot.empty) {
                  list.innerHTML = `
                    <div class="text-center text-gray-400 py-12 flex flex-col items-center">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4 text-gray-300">
                            <i class="fas fa-receipt text-2xl"></i>
                        </div>
                        <p class="font-medium">Δεν υπάρχουν δόσεις.</p>
                        <p class="text-sm mt-1">Πάτα το (+) για να προσθέσεις.</p>
                    </div>`;
                  totalDisplay.innerText = "0.00";
                  activeCountDisplay.innerText = "0 ενεργές";
                  return;
              }

              snapshot.forEach(doc => {
                  const data = doc.data();
                  const start = new Date(data.startDate);
                  const now = new Date();
                  
                  // Υπολογισμός σε ποια δόση βρισκόμαστε (τρέχων μήνας - έναρξη)
                  let currentMonthNum = ((now.getFullYear() - start.getFullYear()) * 12) + (now.getMonth() - start.getMonth()) + 1;
                  
                  if (currentMonthNum < 1) currentMonthNum = 0; // Μελλοντική
                  
                  const isFinished = currentMonthNum > data.totalMonths;
                  const displayNum = isFinished ? data.totalMonths : currentMonthNum;
                  
                  // Υπολογισμός Υπολοίπου
                  const paidAmount = data.monthlyPayment * displayNum;
                  const remainingAmount = data.totalAmount - paidAmount;
                  const progressPercent = (displayNum / data.totalMonths) * 100;

                  // Add to total ONLY if active and started
                  if (!isFinished && currentMonthNum > 0) {
                      totalMonthly += data.monthlyPayment;
                      activeCount++;
                  }

                  // Styling
                  const opacityClass = isFinished ? 'opacity-60 grayscale' : '';
                  const progressColor = isFinished ? 'bg-green-500' : 'bg-blue-600';
                  const statusBadge = isFinished 
                    ? `<span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Εξοφληθη</span>`
                    : `<span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Τρεχει</span>`;

                  // Generate HTML
                  const itemHtml = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 ${opacityClass} relative overflow-hidden group">
                        
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-bold text-gray-800 text-lg leading-tight">${data.title}</h4>
                                <div class="flex gap-2 mt-1">
                                    ${statusBadge}
                                    <span class="text-xs text-gray-400 self-center">Έναρξη: ${start.toLocaleDateString('el-GR')}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="block font-bold text-xl text-gray-800">${data.monthlyPayment.toFixed(2)}€</span>
                                <span class="text-xs text-gray-400">/ μήνα</span>
                            </div>
                        </div>

                        <div class="relative pt-1">
                            <div class="flex mb-2 items-center justify-between">
                                <div>
                                    <span class="text-xs font-semibold inline-block text-gray-500">
                                        Δόση ${displayNum} / ${data.totalMonths}
                                    </span>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs font-semibold inline-block text-gray-600">
                                        Υπόλοιπο: ${remainingAmount.toFixed(0)}€
                                    </span>
                                </div>
                            </div>
                            <div class="overflow-hidden h-2 mb-1 text-xs flex rounded bg-gray-100">
                                <div style="width:${progressPercent}%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center ${progressColor} transition-all duration-1000"></div>
                            </div>
                        </div>
                        
                        <button onclick="deleteInstallment('${doc.id}')" class="absolute bottom-2 right-2 text-gray-200 hover:text-red-500 p-2 transition">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                  `;
                  
                  list.insertAdjacentHTML('beforeend', itemHtml);
              });

              // Update Totals
              totalDisplay.innerText = totalMonthly.toFixed(2);
              activeCountDisplay.innerText = `${activeCount} ενεργές`;
          });
    }

    // --- DELETE FUNCTION ---
    function deleteInstallment(id) {
        if(confirm("Θέλεις σίγουρα να διαγράψεις αυτή τη δόση;")) {
            db.collection('users').doc(currentUser.uid).collection('installments').doc(id).delete()
            .catch(e => alert("Error: " + e.message));
        }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

    // Counter Init
    let count = localStorage.getItem('pageVisits') || 0;
    count++;
    localStorage.setItem('pageVisits', count);
    document.getElementById('visitCount').innerText = count;

</script>

</body>
</html>
